<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFXS</title>
  <link rel="stylesheet" href="styles.css">
  <!-- JSZip (required by epub.js UMD bundle) -->
  <script src="../node_modules/jszip/dist/jszip.min.js"></script>
  <!-- epub.js UMD bundle — exposes window.ePub -->
  <script src="../node_modules/epubjs/dist/epub.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- ── Toolbar ── -->
    <div id="toolbar">
      <button id="toc-toggle"   title="目录 (Ctrl+B)">☰</button>
      <button id="open-btn"     title="打开 PDF / EPUB (Ctrl+O)">打开</button>
      <button id="new-tab-btn"  title="新标签页 (Ctrl+T)">＋</button>
      <div class="sep"></div>
      <button id="prev-btn"     disabled title="上一页 (←)">◀</button>
      <div class="page-nav">
        <input id="page-input" type="number" min="1" value="1">
        <span id="page-total">/ 0</span>
      </div>
      <button id="next-btn"     disabled title="下一页 (→)">▶</button>
      <div class="sep"></div>
      <button id="zoom-out-btn" disabled title="缩小 (Ctrl+-)">−</button>
      <input  id="zoom-input" value="100%" title="输入缩放比例后按 Enter">
      <button id="zoom-in-btn"  disabled title="放大 (Ctrl++)">+</button>
      <button id="zoom-fit-btn" disabled title="适应窗口 (Ctrl+0)">适应</button>
      <div class="sep"></div>
      <!-- Highlight color swatches -->
      <div class="hl-group" title="高亮颜色">
        <button class="hl-swatch active" data-color="#ffff00" style="background:#ffff00" title="黄色高亮"></button>
        <button class="hl-swatch" data-color="#90ee90" style="background:#90ee90" title="绿色高亮"></button>
        <button class="hl-swatch" data-color="#add8e6" style="background:#add8e6" title="蓝色高亮"></button>
      </div>
      <button id="highlight-btn" disabled title="高亮选中文字 (Ctrl+H)">高亮</button>
      <button id="sign-btn"      disabled title="添加签名">签名</button>
      <button id="reading-btn"   title="阅读模式 — 点击左/右下角翻页">阅读</button>
      <button id="tts-btn"       disabled title="朗读 (仅 EPUB)">🔊</button>
      <button id="search-toggle" title="搜索 (Ctrl+F)">🔍</button>
      <button id="night-btn"    title="夜间模式 (Ctrl+D)">夜间</button>
    </div>

    <!-- ── TTS bar ── -->
    <div id="tts-bar" style="display:none">
      <button id="tts-play"   title="播放">▶</button>
      <button id="tts-pause"  title="暂停" disabled>⏸</button>
      <button id="tts-stop"   title="停止" disabled>⏹</button>
      <button id="tts-locate" title="点击定位 — 激活后单击页面文字从该处开始朗读">定位</button>
      <div class="sep"></div>
      <div id="tts-text">—</div>
      <div class="sep"></div>
      <span class="tts-label">速度</span>
      <select id="tts-rate">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <select id="tts-voice" title="朗读声音"></select>
      <button id="tts-close" title="关闭">✕</button>
    </div>

    <!-- ── Search bar ── -->
    <div id="search-bar" style="display:none">
      <input id="search-input" type="text" placeholder="搜索文字…" autocomplete="off">
      <button id="search-run"   title="搜索 (Enter)">搜索</button>
      <button id="search-prev"  title="上一处">↑</button>
      <button id="search-next"  title="下一处">↓</button>
      <span   id="search-count"></span>
      <button id="search-close" title="关闭">✕</button>
    </div>

    <!-- ── Main ── -->
    <div id="main">

      <!-- Sidebar / TOC / Notes -->
      <div id="sidebar">
        <div id="sidebar-tabs">
          <button id="tab-toc"   class="sidebar-tab active" title="目录">目录</button>
          <button id="tab-notes" class="sidebar-tab"        title="笔记">笔记</button>
          <button id="sidebar-close" title="关闭侧栏">✕</button>
        </div>
        <div id="toc-tree"></div>
        <div id="notes-list" style="display:none"></div>
      </div>

      <!-- Content: tab bar + viewers -->
      <div id="content-area">
        <div id="tab-bar"></div>
        <div id="viewers"></div>
      </div>

    </div><!-- /#main -->
  </div><!-- /#app -->

  <!-- ── Signature Modal ── -->
  <div id="sig-modal" style="display:none">
    <div id="sig-dialog">
      <div id="sig-header">
        <span>绘制签名</span>
        <button id="sig-close" title="取消">✕</button>
      </div>
      <canvas id="sig-canvas" width="460" height="180"></canvas>
      <div id="sig-footer">
        <button id="sig-clear">清除</button>
        <button id="sig-confirm" class="primary">确认并点击放置</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
